<script>
(function(){
const STAGE_W=2456, STAGE_H=3070, wrap=document.getElementById('wrap');
const yearEl=document.getElementById('year'), year20El=document.getElementById('year20'), yearTensEl=document.getElementById('yearTens'), yearOnesEl=document.getElementById('yearOnes'), moEl=document.getElementById('mo'), tgEl=document.getElementById('tg'), woEl=document.getElementById('wo'), sEl=document.getElementById('s'), mtEl=document.getElementById('mt'), cmEl=document.getElementById('cm'), chEl=document.getElementById('ch'), hEl=document.getElementById('h'), mEl=document.getElementById('m'), csEl=document.getElementById('cs');
const pushStartStop=document.getElementById('pushStartStop'), pushReset=document.getElementById('pushReset');
const SYNODIC_MONTH=29.530588853, REF_NEW_MOON_UTC_MS=Date.UTC(2000,0,6,18,14,0);
const MO_OFFSET = 90;
const MT_OFFSET = 30;
const chrono=(window.__iwcChrono=window.__iwcChrono||{state:'idle',elapsedMs:0,startPerf:0,lastFireTs:0});
const chronoSnap=(window.__iwcChronoSnap=window.__iwcChronoSnap||{active:false,fromDeg:0,toDeg:0,startTs:0,duration:280});
function easeSnapBack(t){return t*t*t;}
function startChronoSecondSnapBack(fromDeg){
  const normalized=((fromDeg%360)+360)%360;
  if(normalized<0.1){chronoSnap.active=false; return;}
  chronoSnap.active=true;
  chronoSnap.fromDeg=normalized;
  chronoSnap.toDeg=0;
  chronoSnap.startTs=performance.now();
  chronoSnap.duration=280;
}

const SHADOW_ENGINE={
  stageCenterX:STAGE_W/2,
  distanceRange:[14,34],
  blurRange:[3,5],
  opacityRange:[0.22,0.34],
  secondaryOffsetFactor:0.52,
  secondaryBlurFactor:1.65,
  secondaryOpacityFactor:0.50
};

const HAND_SHADOWS={
  h:{distance:18,baseDepth:10,lift:5,blur:3.2,opacity:0.25},
  m:{distance:24,baseDepth:12,lift:7,blur:3.6,opacity:0.28},
  cs:{distance:30,baseDepth:14,lift:9,blur:4.0,opacity:0.31}
};

function clamp(v,min,max){return Math.max(min,Math.min(max,v));}
function round2(v){return Math.round(v*100)/100;}
function buildShadowFilter(dx,dy,blur,opacity){
  const dx2=dx*SHADOW_ENGINE.secondaryOffsetFactor;
  const dy2=dy*SHADOW_ENGINE.secondaryOffsetFactor;
  const blur2=blur*SHADOW_ENGINE.secondaryBlurFactor;
  const opacity2=opacity*SHADOW_ENGINE.secondaryOpacityFactor;
  return 'drop-shadow('+round2(dx)+'px '+round2(dy)+'px '+round2(blur)+'px rgba(0,0,0,'+round2(opacity)+')) '+
         'drop-shadow('+round2(dx2)+'px '+round2(dy2)+'px '+round2(blur2)+'px rgba(0,0,0,'+round2(opacity2)+'))';
}
function applyHandShadow(el,angleDeg,cfg){
  if(!el||!cfg) return;
  const left=parseFloat(el.style.left||el.offsetLeft||0);
  const width=parseFloat(el.style.width||el.offsetWidth||0);
  const handCenterX=left+(width/2);
  const stageBias=clamp((handCenterX-SHADOW_ENGINE.stageCenterX)/(STAGE_W/2),-1,1);
  const rad=angleDeg*Math.PI/180;
  const side=Math.sin(rad);
  const distance=clamp(cfg.distance,SHADOW_ENGINE.distanceRange[0],SHADOW_ENGINE.distanceRange[1]);
  const blur=clamp(cfg.blur,SHADOW_ENGINE.blurRange[0],SHADOW_ENGINE.blurRange[1]);
  const opacity=clamp(cfg.opacity,SHADOW_ENGINE.opacityRange[0],SHADOW_ENGINE.opacityRange[1]);
  const dx=(side*distance)+(stageBias*1.4);
  const liftFactor=((1-Math.cos(rad))*0.5)*cfg.lift;
  const dy=cfg.baseDepth+liftFactor+(Math.abs(side)*1.2);
  el.style.filter=buildShadowFilter(dx,dy,blur,opacity);
}

function fitStage(){
  if(window.__watchZoomController && typeof window.__watchZoomController.fitToScreen==='function'){
    window.__watchZoomController.fitToScreen();
    return;
  }
  const vv=window.visualViewport;
  const vw=vv?vv.width:window.innerWidth;
  const vh=vv?vv.height:window.innerHeight;
  const offsetLeft=vv?vv.offsetLeft:0;
  const offsetTop=vv?vv.offsetTop:0;
  const s=Math.min(vw/STAGE_W,vh/STAGE_H);
  const x=offsetLeft+((vw-STAGE_W*s)/2);
  const y=offsetTop+((vh-STAGE_H*s)/2);
  wrap.style.transform='translate('+x+'px,'+y+'px) scale('+s+')';
}
function moonAgeDays(nowMs){const days=(nowMs-REF_NEW_MOON_UTC_MS)/86400000; let age=days%SYNODIC_MONTH; if(age<0) age+=SYNODIC_MONTH; return age;}
function currentChronoElapsedMs(){if(chrono.state==='running') return chrono.elapsedMs+(performance.now()-chrono.startPerf); return chrono.elapsedMs;}
function dispatchChronoPush(kind){document.dispatchEvent(new CustomEvent('iwc-chrono-push',{detail:{kind:kind,state:chrono.state}}));}
function handleStartStop(){if(chrono.state==='idle'){chrono.state='running'; chrono.elapsedMs=0; chrono.startPerf=performance.now();} else if(chrono.state==='running'){chrono.elapsedMs=currentChronoElapsedMs(); chrono.state='stopped';} else if(chrono.state==='stopped'){chrono.startPerf=performance.now(); chrono.state='running';} dispatchChronoPush('startStop');}
function handleReset(){if(chrono.state==='idle'||chrono.state==='stopped'){const resetFromDeg=((currentChronoElapsedMs()/1000)%60)*6; startChronoSecondSnapBack(resetFromDeg); chrono.elapsedMs=0; chrono.startPerf=performance.now(); chrono.state='idle'; dispatchChronoPush('reset');}}
function bindPush(el, handler){
  if(!el) return;
  let pointerTracking=false;
  let touchTracking=false;
  function blockEvent(e){e.preventDefault(); e.stopPropagation();}
  function fire(handlerName, e){
    const now=performance.now();
    if(now-chrono.lastFireTs<250){blockEvent(e); return;}
    chrono.lastFireTs=now;
    blockEvent(e);
    try{
      if(typeof window.__unlockTickAudio === 'function'){
        const unlocked = window.__unlockTickAudio();
        if(unlocked){
          document.dispatchEvent(new CustomEvent('iwc-audio-unlocked'));
        }
      }
    }catch(_e){}
    try{
      const clickAudio=document.getElementById('chronoClickAudio');
      if(clickAudio){
        clickAudio.volume=1.0;
        clickAudio.muted=false;
        try{ clickAudio.pause(); }catch(_e){}
        try{ clickAudio.currentTime=0; }catch(_e){}
        const clone = clickAudio.cloneNode(true);
        clone.volume = 1.0;
        clone.muted = false;
        clone.playsInline = true;
        const cleanup = function(){ try{ clone.remove(); }catch(__e){} };
        clone.addEventListener('ended', cleanup, {once:true});
        clone.addEventListener('error', cleanup, {once:true});
        document.body.appendChild(clone);
        const p=clone.play();
        if(p && typeof p.catch==='function') p.catch(()=>{ cleanup(); });
      }
    }catch(_e){}
    handler();
  }
  el.addEventListener('pointerdown', function(e){
    if(e.pointerType==='mouse' && e.button!==0) return;
    pointerTracking=true;
    blockEvent(e);
  }, true);
  el.addEventListener('pointerup', function(e){
    if(!pointerTracking) return;
    pointerTracking=false;
    fire('pointer', e);
  }, true);
  el.addEventListener('pointercancel', function(){pointerTracking=false;}, true);
  el.addEventListener('touchstart', function(e){touchTracking=true; blockEvent(e);}, {capture:true, passive:false});
  el.addEventListener('touchend', function(e){if(!touchTracking) return; touchTracking=false; fire('touch', e);}, {capture:true, passive:false});
  el.addEventListener('touchcancel', function(){touchTracking=false;}, {capture:true, passive:false});
  el.addEventListener('click', function(e){fire('click', e);}, true);
}
bindPush(pushStartStop, handleStartStop);
bindPush(pushReset, handleReset);

function render(){
  const now=new Date();
  const nowMs=now.getTime();
  const ms=now.getMilliseconds(), sec=now.getSeconds()+ms/1000, min=now.getMinutes()+sec/60, hr=(now.getHours()%12)+min/60;
  const hDeg=hr*30, mDeg=min*6, sDeg=sec*6;

  const chronoMs=currentChronoElapsedMs(), chronoSec=(chronoMs/1000)%60, chronoMin=Math.floor(chronoMs/60000)%30, chronoHour=(chronoMs/3600000)%12;
  const baseCsDeg=chronoSec*6, cmDeg=chronoMin*12, chDeg=chronoHour*30;
  let csDeg=baseCsDeg;
  if(chronoSnap.active){
    const snapElapsed=performance.now()-chronoSnap.startTs;
    const snapT=Math.min(1, snapElapsed/chronoSnap.duration);
    const eased=easeSnapBack(snapT);
    csDeg=chronoSnap.fromDeg+(chronoSnap.toDeg-chronoSnap.fromDeg)*eased;
    if(snapT>=1){
      chronoSnap.active=false;
      csDeg=0;
    }
  }

  const moonAge=moonAgeDays(nowMs), moDeg=(moonAge/SYNODIC_MONTH)*180 + MO_OFFSET;

  // REALISTIC JUMP MODE with TG fix
  const day = now.getDate();      // 1..31
  const weekday = now.getDay();   // 0..6
  const month0 = now.getMonth();  // 0..11

  // TG fix: remove old -1, show current day directly
  const tgDeg = (day / 31) * 360;
  const woDeg = (weekday / 7) * 360;
  const mtDeg = (month0 / 12) * 360 + MT_OFFSET;

  hEl.style.transform='rotate('+hDeg+'deg)';
  mEl.style.transform='rotate('+mDeg+'deg)';
  sEl.style.transform='rotate('+sDeg+'deg)';
  csEl.style.transform='rotate('+csDeg+'deg)';
  applyHandShadow(hEl,hDeg,HAND_SHADOWS.h);
  applyHandShadow(mEl,mDeg,HAND_SHADOWS.m);
  applyHandShadow(csEl,csDeg,HAND_SHADOWS.cs);
  cmEl.style.transform='rotate('+cmDeg+'deg)';
  chEl.style.transform='rotate('+chDeg+'deg)';
  moEl.style.transform='rotate('+moDeg+'deg)';
  tgEl.style.transform='rotate('+tgDeg+'deg)';
  woEl.style.transform='rotate('+woDeg+'deg)';
  mtEl.style.transform='rotate('+mtDeg+'deg)';
  const yStr=String(now.getFullYear()).padStart(4,'0');
  year20El.textContent=yStr.slice(0,2);
  yearTensEl.textContent=yStr.slice(2,3);
  yearOnesEl.textContent=yStr.slice(3,4);
  requestAnimationFrame(render);
}
window.addEventListener('resize', fitStage, {passive:true});
window.addEventListener('orientationchange', fitStage, {passive:true});
function revealStage(){
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      wrap.classList.add('ready');
    });
  });
}
fitStage();
render();
revealStage();

<script>
(function(){
  const tickSoftAudio = document.getElementById('tickSoftAudio');
  const tickLoudAudio = document.getElementById('tickLoudAudio');
  const chronoClickAudio = document.getElementById('chronoClickAudio');

  const SOFT_VOL = 1.2;
  const LOUD_VOL = 1.0;
  const FADE_MS = 250;

  [tickSoftAudio, tickLoudAudio].forEach(audio => {
    if (!audio) return;
    audio.volume = 0;
  });
  if (chronoClickAudio) chronoClickAudio.volume = 1.0;

  function safePlay(audio){
    if(!audio) return;
    try{
      const p = audio.play();
      if (p && typeof p.catch === 'function') p.catch(() => {});
    }catch(e){}
  }

  function fadeAudio(audio, target){
    if(!audio) return;
    const startVol = Number(audio.volume || 0);
    const startTime = performance.now();
    function step(now){
      const t = Math.min((now - startTime) / FADE_MS, 1);
      audio.volume = startVol + (target - startVol) * t;
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  function syncTickMode(){
    const chrono = window.__iwcChrono || {state:"idle"};
    const running = (chrono.state === "running");
    if (running){
      fadeAudio(tickSoftAudio, 0);
      fadeAudio(tickLoudAudio, LOUD_VOL);
    } else {
      fadeAudio(tickSoftAudio, SOFT_VOL);
      fadeAudio(tickLoudAudio, 0);
    }
  }

  function startTickEngines(){
    if(tickSoftAudio){
      try{ tickSoftAudio.currentTime = 0; }catch(e){}
      safePlay(tickSoftAudio);
    }
    if(tickLoudAudio){
      try{ tickLoudAudio.currentTime = 0; }catch(e){}
      safePlay(tickLoudAudio);
    }
    syncTickMode();
    setTimeout(syncTickMode, 60);
    setTimeout(syncTickMode, 180);
  }

  function playChronoClick(){
    if(!chronoClickAudio) return;
    try{ chronoClickAudio.currentTime = 0; }catch(e){}
    safePlay(chronoClickAudio);
  }

  let tickAudioUnlocked = false;

  function unlockAudio(){
    if (tickAudioUnlocked) return false;
    tickAudioUnlocked = true;

    // Start both engines directly inside the first confirmed user tap.
    startTickEngines();

    // Force an audible idle tick immediately after unlock.
    if(tickSoftAudio){
      try{ tickSoftAudio.muted = false; }catch(e){}
      tickSoftAudio.volume = SOFT_VOL;
    }
    if(tickLoudAudio){
      try{ tickLoudAudio.muted = false; }catch(e){}
      tickLoudAudio.volume = 0;
    }

    requestAnimationFrame(syncTickMode);
    setTimeout(syncTickMode, 120);
    setTimeout(function(){
      if(!window.__iwcChrono || window.__iwcChrono.state !== 'running'){
        if(tickSoftAudio) tickSoftAudio.volume = SOFT_VOL;
        if(tickLoudAudio) tickLoudAudio.volume = 0;
      }
    }, 220);
    return true;
  }

  window.__unlockTickAudio = unlockAudio;

  const startStop = document.getElementById('pushStartStop');
  const reset = document.getElementById('pushReset');

  document.addEventListener('iwc-chrono-push', function(){
    setTimeout(syncTickMode, 30);
  }, true);

  // On iPhone the real start happens on the first confirmed stage tap.
})();
</script>

<script>
(function(){

const el = document.getElementById('glassSweep');
if(!el) return;

const sweepTime = 650;
const startX = -260;
const endX   = 1750;

let sweeping = false;
let sweepStart = 0;
let direction = 1;
let sweepToken = 0;

function startSweep(isMini = false){
  sweeping = true;
  sweepStart = performance.now();
  direction *= -1;
  sweepToken += 1;
  el.dataset.mini = isMini ? '1' : '0';
}

function triggerSweep(){
  startSweep(false);

  // ganz selten: kleiner zweiter Reflex
  if(Math.random() < 0.12){
    setTimeout(() => {
      startSweep(true);
    }, 320);
  }
}

function scheduleNext(){
  // meist um 6.2 s, etwas früher/später
  const next = 5800 + Math.random() * 900;

  setTimeout(() => {
    triggerSweep();
    scheduleNext();
  }, next);
}

scheduleNext();

function frame(now){

  if(sweeping){

    const t = now - sweepStart;

    if(t <= sweepTime){

      const p = t / sweepTime;
      const x = startX + (endX - startX) * p;

      let o = 0;
      if(p < .12) o = p/.12 * .45;
      else if(p < .35) o = .45 + (p-.12)/.23 * .55;
      else if(p < .60) o = 1 - (p-.35)/.25 * .65;
      else o = .35 - (p-.60)/.40 * .35;

      const angle = direction === 1 ? 22 : -22;
      const isMini = el.dataset.mini === '1';
      const opacityScale = isMini ? 0.58 : 1.0;
      const widthScale = isMini ? 0.86 : 1.0;

      el.style.transform =
        'translate3d(' + x.toFixed(1) + 'px,0,0) rotate(' + angle + 'deg) scaleX(' + widthScale + ')';

      el.style.opacity = Math.max(0, o * opacityScale).toFixed(3);

    }else{

      sweeping = false;
      el.style.opacity = 0;
      el.dataset.mini = '0';

    }

  }

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);

})();
</script>
<script>
(function(){
  const STAGE_W = 2456, STAGE_H = 3070;
  const ABS_MIN_SCALE = 0.12;
  const MAX_SCALE = 3.5;
  const viewport = document.getElementById('viewport');
  const wrap = document.getElementById('wrap');
  const tickSoftAudio = document.getElementById('tickSoftAudio');
  const tickLoudAudio = document.getElementById('tickLoudAudio');
  const chronoClickAudio = document.getElementById('chronoClickAudio');
  if(!viewport || !wrap) return;


  let scale = 1;
  let offsetX = 0;
  let offsetY = 0;
  let fitScale = 1;
  let resetScale = 1;
  let pointers = new Map();
  let panState = null;
  let pinchState = null;
  let touchMode = false;

  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

  function getFitScale(){
    const rect = getViewportRect();
    return Math.min(rect.width / STAGE_W, rect.height / STAGE_H);
  }

  function isSmallTouchDevice(){
    const rect = getViewportRect();
    const smallSide = Math.min(rect.width, rect.height);
    return (navigator.maxTouchPoints || 0) > 0 && smallSide <= 950;
  }

  function getResetScale(){
    fitScale = getFitScale();
    return isSmallTouchDevice() ? fitScale * 0.975 : fitScale;
  }

  function getMinScale(){
    return Math.max(ABS_MIN_SCALE, fitScale * 0.32);
  }

  function applyTransform(){
    wrap.style.transformOrigin = '0 0';
    wrap.style.transform = 'translate(' + offsetX + 'px,' + offsetY + 'px) scale(' + scale + ')';
  }

  function getViewportRect(){
    return viewport.getBoundingClientRect();
  }

  function getViewportPoint(clientX, clientY){
    const rect = getViewportRect();
    return { x: clientX - rect.left, y: clientY - rect.top };
  }

  function fitToScreen(){
    if(pointers.size || touchMode || panState || pinchState) return;
    const rect = getViewportRect();
    fitScale = getFitScale();
    resetScale = getResetScale();
    scale = resetScale;
    offsetX = (rect.width - STAGE_W * scale) / 2;
    offsetY = (rect.height - STAGE_H * scale) / 2;
    applyTransform();
  }

  function zoomAtPoint(nextScale, pointX, pointY){
    fitScale = getFitScale();
    const clamped = clamp(nextScale, getMinScale(), MAX_SCALE);
    if(Math.abs(clamped - scale) < 0.0001) return;
    const stageX = (pointX - offsetX) / scale;
    const stageY = (pointY - offsetY) / scale;
    scale = clamped;
    offsetX = pointX - stageX * scale;
    offsetY = pointY - stageY * scale;
    applyTransform();
  }

  function isInteractiveTarget(target){
    return !!(target && target.closest && target.closest('.push,button,input,select,textarea,label,audio'));
  }

  function safePlay(audio){
    if(!audio) return;
    try{
      const p = audio.play();
      if(p && typeof p.catch === 'function') p.catch(()=>{});
    }catch(e){}
  }

  function safePause(audio){
    if(!audio) return;
    try{ audio.pause(); }catch(e){}
  }

  function primeAudioState(){
    if(tickSoftAudio){
      tickSoftAudio.muted = false;
      tickSoftAudio.volume = 1.0;
    }
    if(tickLoudAudio){
      tickLoudAudio.muted = false;
      tickLoudAudio.volume = 0.0;
    }
    if(chronoClickAudio){
      chronoClickAudio.muted = false;
      chronoClickAudio.volume = 1.0;
    }
  }

  function startPan(clientX, clientY){
    panState = {
      startClientX: clientX,
      startClientY: clientY,
      startOffsetX: offsetX,
      startOffsetY: offsetY
    };
    pinchState = null;
  }

  function movePan(clientX, clientY){
    if(!panState) return;
    offsetX = panState.startOffsetX + (clientX - panState.startClientX);
    offsetY = panState.startOffsetY + (clientY - panState.startClientY);
    applyTransform();
  }

  function startPinch(p1, p2){
    const rect = getViewportRect();
    const centerX = ((p1.clientX + p2.clientX) / 2) - rect.left;
    const centerY = ((p1.clientY + p2.clientY) / 2) - rect.top;
    const dx = p2.clientX - p1.clientX;
    const dy = p2.clientY - p1.clientY;
    const distance = Math.max(1, Math.hypot(dx, dy));
    pinchState = {
      startDistance: distance,
      startScale: scale,
      stageX: (centerX - offsetX) / scale,
      stageY: (centerY - offsetY) / scale
    };
    panState = null;
  }

  function movePinch(p1, p2){
    if(!pinchState) return;
    const rect = getViewportRect();
    const centerX = ((p1.clientX + p2.clientX) / 2) - rect.left;
    const centerY = ((p1.clientY + p2.clientY) / 2) - rect.top;
    const dx = p2.clientX - p1.clientX;
    const dy = p2.clientY - p1.clientY;
    const distance = Math.max(1, Math.hypot(dx, dy));
    scale = clamp(pinchState.startScale * (distance / pinchState.startDistance), getMinScale(), MAX_SCALE);
    offsetX = centerX - pinchState.stageX * scale;
    offsetY = centerY - pinchState.stageY * scale;
    applyTransform();
  }

  function syncTouchStateFromPointers(){
    const pts = Array.from(pointers.values()).filter(p => !p.interactive);
    if(pts.length >= 2){
      startPinch(pts[0], pts[1]);
    } else if(pts.length === 1){
      startPan(pts[0].clientX, pts[0].clientY);
    } else {
      panState = null;
      pinchState = null;
    }
  }



  const TAP_MOVE_THRESHOLD = 12;
  const TAP_MAX_MS = 350;
  let pointerTap = null;
  let touchTap = null;

  function isShortTap(startX, startY, endX, endY, startTime){
    return Math.hypot(endX - startX, endY - startY) <= TAP_MOVE_THRESHOLD && (Date.now() - startTime) <= TAP_MAX_MS;
  }

  function hideStageUnlockLayer(){}
  function triggerAudioUnlock(){
    if(typeof window.__unlockTickAudio === 'function'){
      try{
        const unlocked = window.__unlockTickAudio();
        if(unlocked){
          document.dispatchEvent(new CustomEvent('iwc-audio-unlocked'));
          hideStageUnlockLayer();
        }
        return !!unlocked;
      }catch(err){}
    }
    return false;
  }

  // Stage unlock now happens through the normal viewport short-tap logic.
  // No separate transparent unlock layer is used anymore.

  viewport.addEventListener('wheel', function(e){
    if(isInteractiveTarget(e.target)) return;
    e.preventDefault();
    e.stopPropagation();
    const pt = getViewportPoint(e.clientX, e.clientY);
    const factor = e.deltaY < 0 ? 1.12 : (1 / 1.12);
    zoomAtPoint(scale * factor, pt.x, pt.y);
  }, {passive:false});

  viewport.addEventListener('pointerdown', function(e){
    if(touchMode) return;
    const interactive = isInteractiveTarget(e.target);
    pointers.set(e.pointerId, { clientX: e.clientX, clientY: e.clientY, interactive });
    triggerAudioUnlock();
    if(interactive) return;
    if(pointers.size === 1){
      pointerTap = { x: e.clientX, y: e.clientY, time: Date.now(), pointerId: e.pointerId, cancelled: false };
      startPan(e.clientX, e.clientY);
      try{ viewport.setPointerCapture(e.pointerId); }catch(err){}
      e.preventDefault();
      e.stopPropagation();
    } else if(pointers.size >= 2){
      if(pointerTap) pointerTap.cancelled = true;
      syncTouchStateFromPointers();
      e.preventDefault();
      e.stopPropagation();
    }
  }, {passive:false});

  viewport.addEventListener('pointermove', function(e){
    if(touchMode || !pointers.has(e.pointerId)) return;
    const prev = pointers.get(e.pointerId);
    pointers.set(e.pointerId, { clientX: e.clientX, clientY: e.clientY, interactive: prev.interactive });
    if(prev.interactive) return;

    const pts = Array.from(pointers.values()).filter(p => !p.interactive);
    if(pointerTap && (Math.abs(e.clientX - pointerTap.x) > TAP_MOVE_THRESHOLD || Math.abs(e.clientY - pointerTap.y) > TAP_MOVE_THRESHOLD)) pointerTap.cancelled = true;

    if(pts.length >= 2){
      movePinch(pts[0], pts[1]);
      e.preventDefault();
      e.stopPropagation();
      return;
    }
    if(pts.length === 1 && panState){
      movePan(e.clientX, e.clientY);
      e.preventDefault();
      e.stopPropagation();
    }
  }, {passive:false});

  function endPointer(e){
    const tap = pointerTap;
    pointers.delete(e.pointerId);
    try{ viewport.releasePointerCapture(e.pointerId); }catch(err){}
    if(touchMode) return;
    syncTouchStateFromPointers();
    if(tap && tap.pointerId === e.pointerId){
      if(!tap.cancelled && pointers.size === 0 && isShortTap(tap.x, tap.y, e.clientX || tap.x, e.clientY || tap.y, tap.time)){
        triggerAudioUnlock();
      }
      pointerTap = null;
    }
  }

  viewport.addEventListener('pointerup', endPointer, {passive:true});
  viewport.addEventListener('pointercancel', endPointer, {passive:true});
  viewport.addEventListener('pointerleave', function(e){
    if(e.pointerType !== 'mouse') return;
    endPointer(e);
  }, {passive:true});

  viewport.addEventListener('touchstart', function(e){
    touchMode = true;
    triggerAudioUnlock();
    if(isInteractiveTarget(e.target)) return;
    if(!e.touches || !e.touches.length) return;
    e.preventDefault();
    e.stopPropagation();
    if(e.touches.length >= 2){
      touchTap = null;
      startPinch(e.touches[0], e.touches[1]);
    } else {
      touchTap = { x: e.touches[0].clientX, y: e.touches[0].clientY, time: Date.now(), cancelled: false };
      startPan(e.touches[0].clientX, e.touches[0].clientY);
    }
  }, {passive:false});

  viewport.addEventListener('touchmove', function(e){
    if(isInteractiveTarget(e.target)) return;
    if(!e.touches || !e.touches.length) return;
    e.preventDefault();
    e.stopPropagation();
    if(e.touches.length >= 2){
      if(touchTap) touchTap.cancelled = true;
      if(!pinchState) startPinch(e.touches[0], e.touches[1]);
      movePinch(e.touches[0], e.touches[1]);
    } else {
      if(touchTap && (Math.abs(e.touches[0].clientX - touchTap.x) > TAP_MOVE_THRESHOLD || Math.abs(e.touches[0].clientY - touchTap.y) > TAP_MOVE_THRESHOLD)) touchTap.cancelled = true;
      if(!panState) startPan(e.touches[0].clientX, e.touches[0].clientY);
      movePan(e.touches[0].clientX, e.touches[0].clientY);
    }
  }, {passive:false});

  function finishTouch(e){
    if(e && !isInteractiveTarget(e.target)){
      e.preventDefault();
      e.stopPropagation();
    }

    if(e && e.type === 'touchend' && touchTap && (!e.touches || e.touches.length === 0)){
      const changed = e.changedTouches && e.changedTouches[0] ? e.changedTouches[0] : null;
      const endX = changed ? changed.clientX : touchTap.x;
      const endY = changed ? changed.clientY : touchTap.y;
      if(!touchTap.cancelled && isShortTap(touchTap.x, touchTap.y, endX, endY, touchTap.time)){
        triggerAudioUnlock();
      }
      touchTap = null;
    }

    if(e && e.touches && e.touches.length >= 2){
      touchTap = null;
      startPinch(e.touches[0], e.touches[1]);
      return;
    }
    if(e && e.touches && e.touches.length === 1){
      touchTap = { x: e.touches[0].clientX, y: e.touches[0].clientY, time: Date.now(), cancelled: false };
      startPan(e.touches[0].clientX, e.touches[0].clientY);
      return;
    }
    touchMode = false;
    panState = null;
    pinchState = null;
  }

  viewport.addEventListener('touchend', finishTouch, {passive:false});
  viewport.addEventListener('touchcancel', finishTouch, {passive:false});

  ['gesturestart','gesturechange','gestureend'].forEach(function(name){
    viewport.addEventListener(name, function(e){
      e.preventDefault();
      e.stopPropagation();
    }, {passive:false});
  });

  window.__watchZoomController = { fitToScreen };

  window.addEventListener('resize', fitToScreen, {passive:true});
  window.addEventListener('orientationchange', function(){
    setTimeout(fitToScreen, 80);
  }, {passive:true});

  fitToScreen();
  primeAudioState();
})();
</script>
